name: Quant GEX Pipeline

on:
  schedule:
    - cron: '30 21 * * *'
  workflow_dispatch:

# Pagesへのデプロイに必要な権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行をキャンセル
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy plotly yfinance

      - name: Execute Quant Engine
        run: |
          # docsディレクトリをクリーンアップ
          rm -rf docs
          mkdir docs
          
          # .nojekyllを生成
          touch docs/.nojekyll
          
          # HTMLを生成
          python main.py

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # docsフォルダの中身をアーティファクトとしてアップロード
          path: './docs'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
