name: Quant GEX Pipeline

on:
  schedule:
    - cron: '30 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # AI用の google-generativeai を追加
          pip install pandas numpy scipy plotly yfinance google-generativeai

      - name: Execute Quant Engine
        env:
          # GitHub SecretsからAPIキーを読み込み、Pythonスクリプトに渡す
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # docsディレクトリを確実に作成（エラー回避）
          mkdir -p docs
          
          # 【最重要】Jekyllの勝手なビルドを殺すファイルをdocs内に強制配置
          touch docs/.nojekyll
          
          # HTMLを生成（CSVがルートにあればここで読み込まれます）
          python main.py

      - name: Commit and Push to main
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # .nojekyllも含め、docs内の全ファイルを強制的にGitの追跡対象にする
          git add -f docs/
          
          # コミットしてmainブランチへ直接Push
          git commit -m "chore: Auto-update GEX Radar and bypass Jekyll" || exit 0
          git push origin main
