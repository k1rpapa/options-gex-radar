name: Quant GEX Pipeline

on:
  schedule:
    - cron: '30 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy plotly yfinance

      - name: Execute Quant Engine
        run: python main.py

      - name: Validate Output Artifacts
        run: |
          echo "Checking generated files in docs/:"
          find docs -name "*.html" -exec ls -l {} \;

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          # 警告の原因となっていた full_sync を削除し、force_orphan で強制上書きを行う
          force_orphan: true 
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
