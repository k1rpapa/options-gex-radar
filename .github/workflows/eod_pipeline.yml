name: Quant GEX Pipeline

on:
  schedule:
    - cron: '30 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy plotly yfinance

      - name: Execute Quant Engine
        run: |
          # 実行前に既存のアーティファクトをクリーンアップ
          rm -rf docs/*
          python main.py

      - name: Commit and Push to main
        run: |
          # GitHub Actions Botとして main ブランチの docs/ 配下へ直接コミット
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          # 差分がない場合（休場日など）はエラーにせずスキップ
          git commit -m "chore: Daily GEX Profile Update [skip ci]" || exit 0
          git push origin main
