name: Quant Options GEX Pipeline

on:
  schedule:
    - cron: '30 21 * * *' # UTC 21:30 (JST 06:30)
  workflow_dispatch: # 手動実行用

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright
        run: |
          # pip経由でインストール済みのplaywrightモジュールを使用してブラウザを導入する
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Execute Quant Engine
        env:
          # 必要に応じてAPIキー等をSecretsから注入
          # BARCHART_API_KEY: ${{ secrets.BARCHART_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python main.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true # 履歴をリセットしてクリーンなデプロイを維持
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
